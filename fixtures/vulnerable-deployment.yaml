apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-web-app
  namespace: production
spec:
  template:
    spec:
      hostNetwork: true
      containers:
        - name: web
          image: mycompany/web-app:latest
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
